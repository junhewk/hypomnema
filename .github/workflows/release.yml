name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  # ── Go server — Linux binaries (cross-compiled) ─────────────

  go-linux:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            suffix: linux-amd64
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            suffix: linux-arm64
            pkg: gcc-aarch64-linux-gnu
          - goarch: arm
            cc: arm-linux-gnueabihf-gcc
            goarm: "7"
            suffix: linux-armv7
            pkg: gcc-arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install cross-compiler
        if: matrix.pkg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ${{ matrix.pkg }}

      - name: Build
        working-directory: server
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          go build -tags sqlite_fts5 -ldflags="-s -w" -o hypomnema ./cmd/hypomnema
          tar czf hypomnema-${{ matrix.suffix }}.tar.gz hypomnema

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: server/hypomnema-${{ matrix.suffix }}.tar.gz

  # ── Go server — macOS binaries (native) ─────────────────────

  go-macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            suffix: darwin-arm64
          - goarch: amd64
            suffix: darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        working-directory: server
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          go build -tags sqlite_fts5 -ldflags="-s -w" -o hypomnema ./cmd/hypomnema
          tar czf hypomnema-${{ matrix.suffix }}.tar.gz hypomnema

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: server/hypomnema-${{ matrix.suffix }}.tar.gz

  # ── Python — Docker ─────────────────────────────────────────

  docker:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hypomnema:${{ github.ref_name }} .

  # ── Python — Desktop apps ───────────────────────────────────

  desktop-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group desktop

      - name: Build desktop app
        run: uv run python packaging/build.py

      - name: Zip .app bundle
        run: cd packaging/dist && zip -r Hypomnema-macOS.zip Hypomnema.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/Hypomnema-macOS.zip

  desktop-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group desktop

      - name: Build desktop app
        run: uv run python packaging/build.py

      - name: Zip build
        run: Compress-Archive -Path packaging/dist/hypomnema -DestinationPath packaging/dist/Hypomnema-Windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/Hypomnema-Windows.zip
