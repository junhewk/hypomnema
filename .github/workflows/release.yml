name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  docker:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hypomnema:${{ github.ref_name }} .

  desktop-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group desktop

      - name: Build desktop app
        run: uv run python packaging/build.py

      - name: Zip .app bundle
        run: cd packaging/dist && zip -r Hypomnema-macOS.zip Hypomnema.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/Hypomnema-macOS.zip

  desktop-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group desktop

      - name: Build desktop app
        run: uv run python packaging/build.py

      - name: Zip build
        run: Compress-Archive -Path packaging/dist/hypomnema -DestinationPath packaging/dist/Hypomnema-Windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/Hypomnema-Windows.zip
