name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Test
        run: uv run pytest -x -q

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        working-directory: server
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 ./cmd/hypomnema

      - name: Vet
        working-directory: server
        run: go vet ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .

  desktop-macos:
    needs: test-python
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group desktop

      - name: Build desktop app
        run: uv run python packaging/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hypomnema-macOS
          path: packaging/dist/Hypomnema.app

  desktop-windows:
    needs: test-python
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group desktop

      - name: Build desktop app
        run: uv run python packaging/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hypomnema-Windows
          path: packaging/dist/hypomnema/
